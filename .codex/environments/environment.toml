# THIS IS AUTOGENERATED. DO NOT EDIT MANUALLY
version = 1
name = "careers10-arena-main"

[setup]
script = '''
@echo off
setlocal

echo [Codex setup] Starting worktree setup...

REM Ensure pip exists
python -m ensurepip --upgrade >nul 2>nul

REM Install Python dependencies
if exist requirements.txt (
    echo Installing Python dependencies...
    python -m pip install --user -r requirements.txt
)

REM Install Node dependencies if present
if exist package.json (
    echo Installing Node dependencies...
    call npm install
)

REM Create runtime folders
if not exist server\data mkdir server\data
if not exist server\uploads mkdir server\uploads

echo [Codex setup] Setup complete.
endlocal
'''
