# THIS IS AUTOGENERATED. DO NOT EDIT MANUALLY
version = 1
name = "careers10-arena-main"

[setup]
script = '''
Write-Host "[Codex setup] Starting worktree setup..."

# Ensure pip exists
python -m ensurepip --upgrade 2>$null

# Install Python dependencies
if (Test-Path "requirements.txt") {
    Write-Host "Installing Python dependencies..."
    python -m pip install --user -r requirements.txt
}

# Install Node dependencies if present
if (Test-Path "package.json") {
    Write-Host "Installing Node dependencies..."
    npm install
}

# Create runtime directories
if (!(Test-Path "server/data")) {
    New-Item -ItemType Directory -Path "server/data" | Out-Null
}

if (!(Test-Path "server/uploads")) {
    New-Item -ItemType Directory -Path "server/uploads" | Out-Null
}

Write-Host "[Codex setup] Setup complete."
'''
