name: Build Windows release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Release version. Defaults to VERSION or tag name."
        required: false
        type: string
  push:
    tags:
      - "v*"

jobs:
  windows:
    name: Build Host and Client
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
          python -m pip install -r requirements-build.txt

      - name: Resolve build version
        shell: pwsh
        run: |
          $version = "${{ github.event.inputs.version }}"
          if ([string]::IsNullOrWhiteSpace($version)) {
            if ($env:GITHUB_REF_TYPE -eq "tag") {
              $version = $env:GITHUB_REF_NAME.TrimStart("v")
            } else {
              $version = (Get-Content VERSION -Raw).Trim()
            }
          }
          "CORTISOL_BUILD_VERSION=$version" | Out-File -FilePath $env:GITHUB_ENV -Append

      - name: Build release zip
        shell: pwsh
        run: .\scripts\build_release.ps1 -Version $env:CORTISOL_BUILD_VERSION -Clean

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: Cortisol-Arcade-${{ env.CORTISOL_BUILD_VERSION }}-windows
          path: dist/release/*.zip
          if-no-files-found: error

      - name: Publish GitHub release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/release/*.zip
