<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Cortisol Arcade</title>
  <link rel="stylesheet" href="/css/styles.css">
</head>
<body>
  <div id="appRoot" class="app-shell">
    <aside id="shellSidebar" class="shell-sidebar" aria-label="Primary navigation">
      <div class="sidebar-brand">
        <div class="brand-mark">CA</div>
        <div class="brand-copy">
          <strong>Cortisol Arcade</strong>
          <span>Desktop simulation client</span>
        </div>
      </div>

      <nav id="sidebarNav" class="sidebar-nav">
        <button class="nav-item" data-route="home" type="button">
          <span class="nav-key">H</span>
          <span class="nav-label">Home</span>
        </button>
        <button class="nav-item" data-route="play" type="button">
          <span class="nav-key">P</span>
          <span class="nav-label">Play</span>
        </button>
        <button class="nav-item" data-route="wallets" type="button">
          <span class="nav-key">W</span>
          <span class="nav-label">Wallets</span>
        </button>
        <button class="nav-item" data-route="market" type="button">
          <span class="nav-key">M</span>
          <span class="nav-label">Market</span>
        </button>
        <button class="nav-item" data-route="explorer" type="button">
          <span class="nav-key">E</span>
          <span class="nav-label">Explorer</span>
        </button>
        <button class="nav-item" data-route="minigames" type="button">
          <span class="nav-key">G</span>
          <span class="nav-label">Mini-Games</span>
        </button>
        <button class="nav-item" data-route="messages" type="button">
          <span class="nav-key">D</span>
          <span class="nav-label">Messages</span>
          <span id="badgeMessages" class="nav-badge hidden"></span>
        </button>
        <button class="nav-item" data-route="leaderboard" type="button">
          <span class="nav-key">L</span>
          <span class="nav-label">Leaderboard</span>
        </button>
        <button class="nav-item" data-route="settings" type="button">
          <span class="nav-key">S</span>
          <span class="nav-label">Settings</span>
        </button>
      </nav>

      <div class="sidebar-footer">
        <div class="status-line">
          <span class="status-dot" id="wsDot"></span>
          <div class="status-copy">
            <div id="wsStatusText">Offline</div>
            <div class="small muted" id="serverHintText">Simulation layer</div>
          </div>
        </div>
      </div>
    </aside>

    <section class="shell-main">
      <header class="shell-topbar">
        <div class="topbar-section topbar-section-title">
          <button id="sidebarToggle" class="icon-btn mobile-only" type="button" aria-label="Open navigation">Menu</button>
          <div class="title-copy">
            <h1 id="screenTitle">Home</h1>
            <div id="screenSubtitle" class="screen-subtitle"></div>
          </div>
        </div>

        <form id="globalSearchForm" class="global-search" role="search">
          <input
            id="globalSearchInput"
            type="search"
            autocomplete="off"
            placeholder="Jump to a section, token, wallet, block, tx, or @user"
          >
        </form>

        <div class="topbar-section topbar-section-actions">
          <div class="network-chip">
            <span class="small muted">Network</span>
            <strong id="topbarNetLabel">Simnet</strong>
          </div>
          <button id="quickMessageBtn" class="btn secondary" type="button">New message</button>
          <button id="quickTokenBtn" class="btn secondary" type="button">Create token</button>
          <div class="topbar-bell-wrap">
            <button id="bellBtn" class="icon-btn" type="button" aria-label="Notifications">
              Alerts
              <span id="bellBadge" class="icon-badge hidden"></span>
            </button>
            <div id="bellPanel" class="bell-panel" role="dialog" aria-label="Notifications">
              <div class="bell-panel-header">
                <strong>Notifications</strong>
              </div>
              <div id="bellList" class="bell-list"></div>
            </div>
          </div>
          <div id="userChip" class="user-chip">
            <span class="avatar"></span>
            <span id="userChipLabel">Guest</span>
          </div>
        </div>
      </header>

      <div class="shell-workspace">
        <main class="workspace-main">
          <div class="main-scroll">
            <div id="screenHost" class="screen-host">
              <div id="screenLoading" class="screen-loading">
                <div class="screen-loading-card">
                  <div id="screenLoadingText" class="screen-loading-text">Loading...</div>
                  <div class="loading-line"></div>
                </div>
              </div>
            </div>
          </div>
        </main>

        <aside id="shellInspector" class="shell-inspector hidden" aria-label="Detail panel">
          <div class="inspector-header">
            <div>
              <div id="inspectorTitle" class="inspector-title">Details</div>
              <div id="inspectorSubtitle" class="inspector-subtitle"></div>
            </div>
            <button id="inspectorCloseBtn" class="icon-btn" type="button" aria-label="Close details">Close</button>
          </div>
          <div id="inspectorContent" class="inspector-content"></div>
        </aside>
      </div>
    </section>
  </div>

  <div id="authOverlay" class="auth-overlay hidden">
    <div class="auth-dialog">
      <section class="auth-card">
        <div class="auth-header">
          <h2>Sign in</h2>
          <p>Use an existing profile to open the client.</p>
        </div>
        <div id="authStatus" class="status info">Sign in to continue.</div>
        <form id="loginForm" class="form-stack">
          <label>Username <input id="loginUsername" autocomplete="username" required></label>
          <label>Password <input id="loginPassword" type="password" autocomplete="current-password" required></label>
          <button class="btn primary" type="submit">Login</button>
        </form>
      </section>

      <section class="auth-card">
        <div class="auth-header">
          <h2>Create account</h2>
          <p>New profiles get wallets, market history, messages, and game progress.</p>
        </div>
        <form id="registerForm" class="form-stack">
          <label>Username <input id="regUsername" autocomplete="username" required></label>
          <label>Display Name <input id="regDisplayName" autocomplete="name"></label>
          <label>Password <input id="regPassword" type="password" autocomplete="new-password" required></label>
          <button class="btn secondary" type="submit">Create account</button>
        </form>
      </section>
    </div>
  </div>

  <div id="toastStack" class="toast-stack"></div>
  <div id="debugOverlay" class="debug-overlay hidden"></div>

  <script type="module" src="/js/app.js"></script>
</body>
</html>
